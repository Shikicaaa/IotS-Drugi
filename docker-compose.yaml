services:
  db:
    image: timescale/timescaledb:latest-pg17
    restart: unless-stopped
    command: postgres -c max_connections=500
    environment:
      POSTGRES_DB: iots
      POSTGRES_USER: iots
      POSTGRES_PASSWORD: iots
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iots -d iots"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  rest:
    build:
      context: .
      dockerfile: backend/dockerfile.rest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://iots:iots@db:5432/iots
      SECRET_KEY: c8cb051bc8f4eed64b83c434e3932f25d5e1ee3871c1a9bc876c96b6ce94d46d
      JWT_SECRET_KEY: c8cb051bc8f4eed64b83c434e3932f25d5e1ee3871c1a9bc876c96b6ce94d46d
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    
  gql:
    build:
      context: .
      dockerfile: backend/dockerfile.gql
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://iots:iots@db:5432/iots
      SECRET_KEY: c8cb051bc8f4eed64b83c434e3932f25d5e1ee3871c1a9bc876c96b6ce94d46d
      JWT_SECRET_KEY: c8cb051bc8f4eed64b83c434e3932f25d5e1ee3871c1a9bc876c96b6ce94d46d
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
  
  grpc:
    build:
      context: .
      dockerfile: backend/dockerfile.grpc
    restart: unless-stopped
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy
  
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.0
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
 
volumes:
  pgdata:
  kafka_data: